<div class="content-page">
    <div class="container-fluid">
        <div class="row justify-content-center py-2 pt-3">
            <div class="col-xxl-5 col-xl-7 text-center">
                <h3 class="fw-bold">
                    Student View Profile
                </h3>
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-lg-12">
                <form class="rounded border p-3" style="background-color: #fff;">

                    <div class="row gap-3">
                        <div class="col-lg-4">
                            <div class="row g-lg-4 g-1">
                                <div class="col-lg-4">
                                    <label for="SearchInput" class="col-form-label" style="font-weight: 600;">Find Student</label>
                                </div>
                                <div class="col-lg-8">
                                    <div class="app-search">
                                        <input type="search" class="form-control" id="SearchInput" (keyup)="nameFilter($event)" placeholder="Search for something...">
                                        <i class="ti ti-search fs-24 positionCustom"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col">
                            <div class="d-flex justify-content-end">
                                <!-- Designation Filter -->
                                <div class="app-search">
                                    <select class="form-select form-control my-1 my-md-0" style="padding-left: 18px;" (change)="classChange($event)">
                                        <option selected>Select Class</option>
                                        <option *ngFor="let data of this.AllClassRec" [value]="data.GenClassKey" >{{data.GenClassValue}}</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="d-flex ">
            <div class="row" >
                @if(data2?.length > 0){
                <div class="col" *ngFor="let data of this.data2">

                    <div class="card card-hovered">
                        <div class="card-body">
                            <div class="d-flex align-items-center mb-4">
                                <div class="me-3 position-relative">
                                    <img [src]="Url+data.StudnetPhoto" alt="avatar" class="rounded-circle" width="72" height="72">
                                    <span class="position-absolute bottom-0 end-0 badge bg-primary rounded-circle p-1 shadow-sm" title="Rating 4.8">
                                        <i class="ti ti-star text-white"></i>
                                    </span>
                                </div>
                                <div>
                                    <h5 class="mb-1 d-flex align-items-center">
                                        <a href="#!" class="link-reset fw-medium fs-md">{{data.FirstName+ data.LastName}}</a>
                                        <img src="assets/images/flags/in.svg" alt="India" class="ms-2 rounded-circle" height="16">
                                    </h5>
                                    <p class="text-muted mb-1">{{data.AdmissionId}}</p>
                                    <span class="badge bg-success-subtle text-success fw-medium">VERIFIED</span>
                                </div>
                                <div class="ms-auto">
                                    <div class="dropdown">
                                        <a href="#" (click)="removeStduent(data.AdmissionId)" class="btn btn-icon btn-ghost-light text-danger" data-bs-toggle="dropdown">
                                            <i class="ti ti-trash fs-xl"></i>
                                        </a>
                                    </div>
                                </div>
                            </div>
                            <p class="text-muted mb-2">
                            For communication purposes, the primary contact number is {{data.PrimaryContact}}.
                            </p>
                            <div style="display: flex;justify-content: space-between;">
                            <a [routerLink]="['/ViewProfile', data.AdmissionId]" class="icon-link icon-link-hover link-reset fw-medium">
                                View Profile <i class="bi fs-16 ti ti-arrow-narrow-right"></i>
                            </a>
                             <a [routerLink]="['/ViewIdCard', data.AdmissionId]" class="icon-link icon-link-hover link-reset fw-medium">
                               <i class="bi fs-16 ti ti-arrow-narrow-left"></i> Fee Payment 
                            </a>
                            </div>
                        </div> <!-- end card-body -->
                        <div class="card-footer">
                            <div class="row text-center">
                                <div class="col-6">
                                    <div class="text-muted fs-xs mb-1">Attenduce</div>
                                    <div class="fw-bold">76%</div>
                                </div>
                                <div class="col-6">
                                    <div class="text-muted fs-xs mb-1">Due Fees</div>
                                    <div class="fw-bold">335.00</div>
                                </div>
                            </div>
                        </div> <!-- end card-footer-->
                    </div> <!-- end card-->
                    
                    
                </div> <!-- end col-->
                }
                 @else {

                <div style="width: 100%; height: 70vh;display: flex;justify-content: center;align-items: center;">
                        <!-- <h1>Record not found</h1> -->
                </div>
                }

            </div> 
        </div>

            </li>

    </div>
</div>
