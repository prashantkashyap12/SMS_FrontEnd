<div class="content-page">
    <div class="container-fluid">
        <div class="row justify-content-center py-2 pt-3">
            <div class="col-xxl-5 col-xl-7 text-center">
                <h3 class="fw-bold">
                    <!-- Student Fee Stracture -->
                </h3>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-12">

                <div class="card">
                    <div class="card-header justify-content-between">
                        <h5 class="card-title">Create Fee Stracture</h5>
                        <div class="row g-lg-4 g-2">
                            <div class="col-lg-8">
                                <div class="app-search">
                                    <!-- <input type="search" class="form-control" id="SearchInput" placeholder="Search for something...">
                                    <i class="ti ti-search fs-24 positionCustom"></i> -->
                                    <div class="ng-autocomplete">
                                        <ng-autocomplete 
                                        [data]="data"
                                        [searchKeyword]="keyboard"
                                        placeholder="Select country"
                                        (selected)='selectEvent($event)'
                                        (inputChanged)='onChangeSearch($event)'
                                        (inputFocused)='onFocused($event)'
                                        [itemTemplate]="itemTemplate"
                                        [notFoundTemplate]="notFoundTemplate">                                 
                                        </ng-autocomplete>

                                        <ng-template #itemTemplate let-item>
                                        <a [innerHTML]="item.FeeStractRemark"></a>
                                        </ng-template>

                                        <ng-template #notFoundTemplate let-notFound>
                                        <div [innerHTML]="notFound"></div>
                                        </ng-template>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                        <div class="card-body">
                        <form class="row g-3 needs-validation" [formGroup]="FeeStractForm">
                            <div class="col-md-6">
                                <div class="row ">
                                    <div class="col-lg-12">
                                        <label class="col-form-label" style="padding-top: 0px;">Select Fee Section</label>
                                    </div>
                                    <div class="col-lg-12">
                                        <select class="form-select" formControlName="FeeId" (change)="dataVal($event)" required>
                                            <option selected="">Select Fee Section</option>
                                            <option *ngFor="let a of this.FeeIdRec" [value]="a.FeeId">{{ a.FeeName }}</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="row ">
                                    <div class="col-lg-12">
                                        <label class="col-form-label" style="padding-top: 0px;">Select Genrated Class</label>
                                    </div>
                                    <div class="col-lg-12">
                                        <select class="form-select" formControlName="ClassId" (change)="dataVal($event)" >
                                            <option selected="">Select Genrated Class</option>
                                            <option *ngFor="let a of this.ClassIdRec" [value]="a.ClassId">{{ a.GenClassValue }}</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <label for="validationCustom01" class="form-label">Fee Amount</label>
                                <input type="number" class="form-control" id="validationCustom01" placeholder="₹" formControlName="Fee_Amount" required>
                                <div class="valid-feedback">
                                    Looks great!
                                </div>
                            </div>
                            <div class="col-md-3">
                                <label for="validationCustom01" class="form-label">Late Fee Penalty </label>
                                <input type="number" class="form-control" id="validationCustom01" placeholder="₹" formControlName="Fee_Panalty"  required>
                                <div class="valid-feedback">
                                    Looks great!
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="validationCustom02" class="form-label">Fee Name</label>
                                <input type="text" class="form-control" id="validationCustom02" placeholder="Enter Fee Name..." formControlName="FeeStractRemark" required>
                                <div class="valid-feedback">
                                    Looks great!
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="invalidCheck" required>
                                    <label class="form-check-label" for="invalidCheck">
                                        I agree to the terms and conditions
                                    </label>
                                    <div class="invalid-feedback">
                                        You must agree before submitting.
                                    </div>
                                </div>
                            </div>
                            <div class="col-12 d-flex">
                                 <!-- Submit or update -->
                                <button class="btn btn-primary" type="submit" (click)="onSubmit()" [ngClass]="isButton?'btn-primary':'btn-outline-secondary'">{{isButton?'Create':'Update'}}</button>&nbsp;
                                <!-- Delete -->
                                <button class="btn btn-outline-secondary" type="button" (click)="delete()" [ngStyle]="{'display': isButton ? 'none' : 'block'}" >Delete</button>&nbsp;
                                <!-- Fresh -->
                                <button class="btn btn-outline-secondary" type="button" (click)="clear()">Clear</button>&nbsp;
                            </div> 
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
