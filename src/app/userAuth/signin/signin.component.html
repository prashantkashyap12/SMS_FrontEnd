 <div class="auth-box overflow-hidden align-items-center d-flex bg-card">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xxl-4 col-md-6 col-sm-8">
                    <div class="card">
                        <div class="card-body">
                            <div class="auth-brand mb-4">
                                <a [href]="mainWeb" class="logo-dark">
                                    <span class="d-flex align-items-center gap-1">
                                        <span class="avatar avatar-xs rounded-circle text-bg-dark">
                                            <span class="avatar-title">
                                                <i data-lucide="sparkles" class="fs-md"></i>
                                            </span>
                                        </span>
                                        <span class="logo-text text-body fw-bold fs-xl">School Managment Software</span>
                                    </span>
                                </a>
                                <a [href]="mainWeb" class="logo-light">
                                    <span class="d-flex align-items-center gap-1">
                                        <span class="avatar avatar-xs rounded-circle text-bg-dark">
                                            <span class="avatar-title">
                                                <i data-lucide="sparkles" class="fs-md"></i>
                                            </span>
                                        </span>
                                        <span class="logo-text text-white fw-bold fs-xl">TeaBook</span>
                                    </span>
                                </a>
                                <p class="text-muted w-lg-75 mt-3">Let’s get you signed in. Enter your email and password to continue.</p>
                            </div>
            
                            <div class="">
                                <form [formGroup]="signupForm" *ngIf="signupForm">
                                    <div class="mb-3">
                                        <label for="userEmail" class="form-label">Email address <span class="text-danger">*</span></label>
                                        <div class="input-group">
                                            <input type="email" class="form-control" id="userEmail" formControlName="email" placeholder="you@example.com" required>
                                        </div>
                                    </div>
            
                                    <div class="mb-3">
                                        <label for="userPassword" class="form-label">Password <span class="text-danger">*</span></label>
                                        <div class="input-group">
                                            <input type="password" class="form-control" id="userPassword" formControlName="password" placeholder="••••••••" required>
                                        </div>
                                    </div>
            
                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <div class="form-check">
                                            <input class="form-check-input form-check-input-light fs-14" type="checkbox" id="rememberMe">
                                            <label class="form-check-label" for="rememberMe">Keep me signed in</label>
                                        </div>
                                        <a (click)="sign('forget')" class="text-decoration-underline link-offset-3 text-muted cursor">Forgot Password?</a>
                                    </div>
            
                                    <div class="d-grid">
                                        <button (click)="onSubmit()" class="btn btn-primary fw-semibold py-2 cursor">Sign In</button>
                                    </div>
                                </form>
            
                                <p class="text-muted text-center mt-4 mb-0">
                                    New here? <a (click)="sign('signup')" class="text-decoration-underline link-offset-3 fw-semibold cursor">Create an account</a>
                                </p>
                            </div>
                        </div>
                    </div>
                    <p class="text-center text-muted mt-4 mb-0">
                        © RBS College — by <span class="fw-semibold">Aditya Infotech</span>
                    </p>
                </div>
            </div>
        </div>
    </div>
