<div class="auth-box overflow-hidden align-items-center d-flex bg-card">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xxl-4 col-md-6 col-sm-8">
                    <div class="card">
                        <div class="card-body">
                            <div class="auth-brand mb-4">
                                <a href="index.html" class="logo-dark">
                                    <span class="d-flex align-items-center gap-1">
                                        <span class="avatar avatar-xs rounded-circle text-bg-dark">
                                            <span class="avatar-title">
                                                <i data-lucide="sparkles" class="fs-md"></i>
                                            </span>
                                        </span>
                                        <span class="logo-text text-body fw-bold fs-xl">School Management Software</span>
                                    </span>
                                </a>
                                <a href="index.html" class="logo-light">
                                    <span class="d-flex align-items-center gap-1">
                                        <span class="avatar avatar-xs rounded-circle text-bg-dark">
                                            <span class="avatar-title">
                                                <i data-lucide="sparkles" class="fs-md"></i>
                                            </span>
                                        </span>
                                        <span class="logo-text text-white fw-bold fs-xl">School Management Software</span>
                                    </span>
                                </a>
                                <p class="text-muted w-lg-75 mt-3">Enter your email address and we'll send you a link to reset your password.</p>
                            </div>

                            <form [formGroup]="forgetForm" *ngIf="forgetForm">
                                <div class="mb-3">
                                    <label for="userEmail" class="form-label">Email address <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="email" class="form-control" id="userEmail" formControlName="email" placeholder="you@example.com" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input form-check-input-light fs-14" type="checkbox" id="termAndPolicy">
                                        <label class="form-check-label" for="termAndPolicy">Agree the Terms & Policy</label>
                                    </div>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary fw-semibold py-2" (click)="onSubmit()">Send Request</button>
                                </div>
                            </form>

                            <p class="text-muted text-center mt-4 mb-0">
                                Return to <a (click)="route()" class="text-decoration-underline link-offset-3 fw-semibold cursor">Sign in</a>
                            </p>
                        </div>
                    </div>

                    <p class="text-center text-muted mt-4 mb-0">
                        © RBS College — by <span class="fw-semibold">Aditya Infotech</span>
                    </p>
                </div>
            </div>
        </div>
    </div>
